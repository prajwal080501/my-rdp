<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beam</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        section:nth-of-type(2) {
            animation-delay: 0.06s;
        }

        .field-group {
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <h2>Beam</h2>

    <section id="login-view">
        <div id="signup-org-group" class="field-group hidden">
            <label for="signup-org-name">Organization name</label>
            <input id="signup-org-name" placeholder="e.g. Acme Inc" />
        </div>

        <div class="field-group">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" />
        </div>

        <div class="field-group">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" />
        </div>

        <div class="field-group">
            <button id="login-submit-btn">Log in</button>
        </div>

        <div id="login-error" class="error-text"></div>

        <div class="field-group">
            <a href="#" id="auth-mode-toggle">Need an account? Create one</a>
        </div>
    </section>

    <section id="signaling-section" class="hidden">
        <label for="signaling-url">Signaling server URL</label>
        <input id="signaling-url" />
        <button id="signaling-connect-btn">Connect</button>
    </section>

    <section id="home-view" class="hidden">
        <label>Your ID</label>
        <div id="your-id">...</div>

        <div class="field-group">
            <label for="remote-id-input">Connect to remote ID</label>
            <input id="remote-id-input" placeholder="e.g. 123456789" />
            <button id="connect-btn">Connect</button>
        </div>

        <div class="field-group">
            <button id="logout-btn" class="danger">Log out</button>
        </div>
    </section>

    <div id="status">Idle.</div>

    <script src="webrtc/signaling-client.js"></script>
    <script src="webrtc/peer-connection.js"></script>
    <script src="file-receiver.js"></script>
    <script src="views/login.js"></script>
    <script src="views/home.js"></script>
    <script src="renderer.js"></script>
</body>

</html>
