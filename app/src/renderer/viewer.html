<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beam Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 0;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        #toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            animation: fade-in 0.25s ease both;
        }

        #status {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        video {
            flex: 1;
            width: 100%;
            min-height: 0;
            object-fit: contain;
            background: #000;
        }

        #drop-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            color: #fff;
            background: rgba(30, 144, 255, 0.25);
            border: 3px dashed rgba(255, 255, 255, 0.85);
            z-index: 10;
            pointer-events: none;
        }

        #drop-overlay.visible {
            display: flex;
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <span id="status">Connecting...</span>
        <button id="disconnect-btn" class="danger">Disconnect</button>
    </div>
    <video id="remote-screen-video" autoplay></video>
    <div id="drop-overlay">Drop files to send to host</div>

    <script src="webrtc/ipc-signaling-shim.js"></script>
    <script src="webrtc/peer-connection.js"></script>
    <script src="input-capture.js"></script>
    <script src="file-sender.js"></script>
    <script src="viewer-renderer.js"></script>
</body>

</html>
